<!DOCTYPE html>
<html>
    <script>
        let globalId = 1;

        function markAsDone(id){
            const parent = document.getElementById(id);
            parent.children[2].innerHTML = "Done!"
        }
        function createChild(title,  desc, Id){
            const parent = document.createElement("div");
            const firstChild = document.createElement("div");
            firstChild.innerHTML = title;
            const secondChild = document.createElement("div");
            secondChild.innerHTML = desc
            const buttonChild = document.createElement("button");
            buttonChild.innerHTML = "markAsDone!"
            buttonChild.setAttribute("onClick", `markAsDone(${Id})`)
            parent.appendChild(firstChild);
            parent.appendChild(secondChild);
            parent.appendChild(buttonChild);
            parent.setAttribute("id", Id);
            return parent;
        }
        function addTodo(){
            const title = document.getElementById("a").value;
            const desc = document.getElementById("b").value;
            const grandParent = document.getElementById("container");
            
            grandParent.appendChild(createChild(title, desc, globalId++));
        }
        </script>
    <body>
        <input id = "a" placeholder="text"> <br></br>
        <input id = "b" placeholder="text"> <br></br>
        <button onclick="addTodo()">add todo</button> <br></br>
        <div id = "container"></div>
        <br></br>

    </body>
</html>
